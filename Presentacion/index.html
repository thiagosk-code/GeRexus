<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeRexus - Draftoicos</title>
    <link rel="icon" type="image/png" href="../Assets/SocratesPNG.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <a href="#" class="logo-container">
            <img src="../Assets/RexRojoPng.png" alt="GeRexus Logo" class="logo-img">
            <span class="logo-text">GeRexus</span>
        </a>
        
        <div class="header-actions">
            <div class="leng-switcher">
                <span class="active">Esp</span>
                <span class="divider">|</span>
                <a href="#" class="inactive">Eng</a>
            </div>
            
            <button class="tema-toggle" aria-label="Cambiar a modo claro">
                <span class="material-symbols-outlined">light_mode</span>
            </button>
            
            <a href="#" class="login-btn">Iniciar sesion</a>
        </div>
    </header>

    <main class="main-content">
        <h1 class="main-title">Draftoicos</h1>
        
        <p class="main-description">
            Un juego de mesa con mecanicas draft donde asignaras Adeptos de distintas corrientes filosoficas a distintas salas
        </p>
        
        <a href="#" class="btn-jugar">
            Jugar
        </a>
    </main>

</body>
</html>
